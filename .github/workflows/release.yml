name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2.6.0)'
        required: true
        type: string

jobs:
  release:
    name: Build, Sign, Notarize and Release
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.0.1
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app/Contents/Developer

      - name: Show Build Environment
        run: |
          xcodebuild -version
          swift --version
          echo "macOS: $(sw_vers -productVersion)"
          echo "Tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"

      # ── Detect whether Apple Developer signing secrets are configured ──────
      - name: Check Signing Availability
        id: signing
        run: |
          if [ -n "${{ secrets.DEVELOPER_CERTIFICATE_BASE64 }}" ] && \
             [ -n "${{ secrets.APPLE_ID }}" ] && \
             [ -n "${{ secrets.TEAM_ID }}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "✅ Signing secrets found — will build signed + notarized release"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⚠️ Signing secrets not configured — will build unsigned release"
          fi

      # ── Signing path ───────────────────────────────────────────────────────
      - name: Import Code Signing Certificate
        if: steps.signing.outputs.available == 'true'
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)

          echo "Creating temporary keychain..."
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "Importing code signing certificate..."
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          # Allow codesign and xcodebuild to access keychain without prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign:,xcodebuild: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Set as default keychain
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          # Clean up certificate file
          rm -f certificate.p12

          # Find the imported identity
          echo "Finding imported Developer ID certificate..."
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.+)"/\1/')

          if [ -z "$IDENTITY" ]; then
            echo "❌ Error: Developer ID Application certificate not found"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi

          echo "Found identity: $IDENTITY"
          echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV

          echo "✅ Code signing certificate imported successfully"

      # ── Build (always runs) ────────────────────────────────────────────────
      - name: Build Release
        run: |
          echo "Building release..."
          xcodebuild build \
            -project "Claude Usage.xcodeproj" \
            -scheme "Claude Usage" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          echo "✅ Build completed successfully"

      # ── Signing path (continued) ───────────────────────────────────────────
      - name: Sign App Bundle
        if: steps.signing.outputs.available == 'true'
        run: |
          APP_PATH="build/Build/Products/Release/Claude Usage.app"

          echo "Using signing identity: $SIGNING_IDENTITY"
          echo "Signing Sparkle framework components in correct order..."

          # IMPORTANT: Sign in order - XPC Services first, then framework, then main app
          # DO NOT use --deep flag as it breaks XPC service signatures
          # Reference: https://sparkle-project.org/documentation/sandboxing/

          # 1. Sign XPC Services first
          echo "Signing Installer.xpc..."
          codesign --force --sign "$SIGNING_IDENTITY" \
            --timestamp \
            --options runtime \
            "$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Installer.xpc"

          echo "Signing Downloader.xpc..."
          codesign --force --sign "$SIGNING_IDENTITY" \
            --timestamp \
            --options runtime \
            "$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Downloader.xpc"

          # 2. Sign Autoupdate helper
          echo "Signing Autoupdate..."
          codesign --force --sign "$SIGNING_IDENTITY" \
            --timestamp \
            --options runtime \
            "$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/Autoupdate"

          # 3. Sign Updater.app
          echo "Signing Updater.app..."
          codesign --force --sign "$SIGNING_IDENTITY" \
            --timestamp \
            --options runtime \
            "$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/Updater.app"

          # 4. Sign the Sparkle framework itself
          echo "Signing Sparkle framework..."
          codesign --force --sign "$SIGNING_IDENTITY" \
            --timestamp \
            --options runtime \
            "$APP_PATH/Contents/Frameworks/Sparkle.framework"

          # 5. Sign the main app bundle (WITHOUT --deep to preserve nested signatures)
          echo "Signing main app bundle..."
          codesign --force --sign "$SIGNING_IDENTITY" \
            --timestamp \
            --options runtime \
            --entitlements "Claude Usage/Claude UsageRelease.entitlements" \
            "$APP_PATH"

          echo "✅ App bundle signed with $SIGNING_IDENTITY"

      - name: Verify Code Signature
        if: steps.signing.outputs.available == 'true'
        run: |
          APP_PATH="build/Build/Products/Release/Claude Usage.app"

          echo "Verifying code signature..."
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          echo ""
          echo "Code signature details:"
          codesign -dv --verbose=4 "$APP_PATH" 2>&1

          echo ""
          echo "Gatekeeper assessment:"
          spctl --assess --type execute --verbose "$APP_PATH" 2>&1 || true

          echo "✅ Code signature verified"

      - name: Notarize App
        if: steps.signing.outputs.available == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          APP_PATH="build/Build/Products/Release/Claude Usage.app"

          echo "Creating ZIP for notarization..."
          ditto -c -k --keepParent "$APP_PATH" "notarization.zip"

          echo "Submitting app for notarization..."
          echo "This may take 5-15 minutes..."
          xcrun notarytool submit "notarization.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait \
            --timeout 30m

          echo ""
          echo "Notarization successful! Stapling ticket to app..."
          xcrun stapler staple "$APP_PATH"

          echo ""
          echo "Verifying stapled notarization ticket..."
          xcrun stapler validate "$APP_PATH"

          rm -f notarization.zip
          echo "✅ App notarized and stapled successfully!"

      # ── Package (always runs) ──────────────────────────────────────────────
      - name: Create Release Artifact
        run: |
          mkdir -p release
          cp -pR "build/Build/Products/Release/Claude Usage.app" release/

          cd release
          if [ "${{ steps.signing.outputs.available }}" == "true" ]; then
            ZIP_NAME="Claude-Usage.zip"
            echo "Creating signed release ZIP..."
          else
            ZIP_NAME="Claude-Usage-unsigned.zip"
            echo "Creating unsigned release ZIP..."
          fi

          ditto -c -k --keepParent "Claude Usage.app" "$ZIP_NAME"
          shasum -a 256 "$ZIP_NAME" > "$ZIP_NAME.sha256"

          echo ""
          echo "SHA256 Checksum:"
          cat "$ZIP_NAME.sha256"

          # Expose zip name for later steps
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

          echo "✅ Release artifact created: $ZIP_NAME"

      - name: Extract Release Notes from CHANGELOG
        id: changelog_notes
        continue-on-error: true
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"

          echo "Extracting release notes for version $VERSION from CHANGELOG.md"

          awk "/## \[$VERSION\]/{flag=1; next} /^---$|^## \[/{flag=0} flag" CHANGELOG.md > release-notes.md
          sed -i.bak '/^$/d' release-notes.md 2>/dev/null || sed -i '' -e '/^$/d' release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "No release notes found in CHANGELOG.md for version $VERSION"
            echo "changelog_extracted=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Extracted release notes:"
          cat release-notes.md
          echo "changelog_extracted=true" >> $GITHUB_OUTPUT

      - name: Prepare Release Body
        run: |
          # Start from changelog content (may be empty)
          if [ -f release-notes.md ] && [ -s release-notes.md ]; then
            cp release-notes.md release-body.md
          else
            touch release-body.md
          fi

          # Append Gatekeeper guidance when shipping an unsigned binary
          if [ "${{ steps.signing.outputs.available }}" != "true" ]; then
            cat >> release-body.md << 'UNSIGNED_NOTE'

          ---

          > **⚠️ Unsigned build — one-time Gatekeeper step required**
          >
          > This binary is not code-signed with an Apple Developer certificate.
          > macOS will block it on first launch. To open it:
          >
          > **Option A — Terminal (recommended):**
          > ```sh
          > xattr -cr "/Applications/Claude Usage.app"
          > ```
          > Then open the app normally.
          >
          > **Option B — Finder:** Right-click `Claude Usage.app` → **Open** → **Open** (first launch only).
          UNSIGNED_NOTE
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          draft: false
          body_path: release-body.md
          generate_release_notes: ${{ steps.changelog_notes.outputs.changelog_extracted != 'true' && steps.signing.outputs.available == 'true' }}
          files: |
            release/${{ env.ZIP_NAME }}
            release/${{ env.ZIP_NAME }}.sha256
        env:
          # Falls back to GITHUB_TOKEN when RELEASE_TOKEN is not configured
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "🎉 Release ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }} created successfully!"
          echo ""
          if [ "${{ steps.signing.outputs.available }}" == "true" ]; then
            echo "✅ App signed with Developer ID Application certificate"
            echo "✅ App notarized by Apple"
            echo "✅ Notarization ticket stapled to app"
          else
            echo "⚠️ Unsigned build — signing secrets were not configured"
            echo "   Users must run: xattr -cr \"/Applications/Claude Usage.app\""
          fi
          echo "✅ Release published to GitHub"
          echo ""
          echo "Next steps:"
          echo "  - Appcast generation workflow will trigger automatically"
          echo "  - Homebrew cask will update automatically"
          echo "  - Users with automatic updates enabled will be notified"
